<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임 리서치 뷰어</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Header -->
  <header class="header" role="banner">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="메뉴 열기" aria-expanded="false">&#9776;</button>

    <div class="header__brand">
      <a href="#" class="header__title" id="homeLink" aria-label="홈으로 이동">
        <span class="header__title-accent">GD</span> 리서치 뷰어
      </a>
    </div>

    <!-- Breadcrumb (문서 뷰에서만 표시) -->
    <nav class="header__breadcrumb" id="breadcrumb" aria-label="탐색 경로" style="display:none">
      <span class="header__breadcrumb-sep" aria-hidden="true">/</span>
      <span class="header__breadcrumb-item header__breadcrumb-item--category" id="breadcrumbCategory"></span>
      <span class="header__breadcrumb-sep" aria-hidden="true">/</span>
      <span class="header__breadcrumb-item header__breadcrumb-item--current" id="breadcrumbTitle"></span>
    </nav>
  </header>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" role="presentation"></div>

  <!-- Left Sidebar: Document list -->
  <aside class="sidebar" id="sidebar" aria-label="문서 목록">
    <div id="docList"></div>
  </aside>

  <!-- Main content -->
  <main class="main" id="mainArea" role="main">
    <div class="main__inner" id="mainContent">
      <!-- Loading state -->
      <div class="loading-state" id="loadingState" aria-live="polite" aria-label="로딩 중">
        <div class="loading-spinner" role="status" aria-hidden="true"></div>
        <p class="loading-state__text">문서 목록을 불러오는 중...</p>
      </div>
    </div>
  </main>

  <!-- Right TOC Panel (문서 뷰에서만 표시) -->
  <aside class="toc-panel" id="tocPanel" aria-label="목차">
    <div class="toc-panel__title">목차</div>
    <ul class="toc-panel__list" id="tocList"></ul>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    /* ===== Constants ===== */

    const CATEGORY_LABELS = {
      game: '게임 분석',
      market: '시장 분석',
      player: '플레이어 분석',
      liveops: '라이브옵스',
      funnel: '퍼널 분석',
    };

    const CATEGORY_CSS = {
      game: 'doc-card__category--game',
      market: 'doc-card__category--market',
      player: 'doc-card__category--player',
      liveops: 'doc-card__category--liveops',
      funnel: 'doc-card__category--funnel',
    };

    /* ===== State ===== */

    const state = { docs: [], current: null, filter: 'all' };

    /* ===== DOM References ===== */

    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const mainContent = document.getElementById('mainContent');
    const tocPanel = document.getElementById('tocPanel');
    const tocList = document.getElementById('tocList');
    const breadcrumb = document.getElementById('breadcrumb');
    const breadcrumbCategory = document.getElementById('breadcrumbCategory');
    const breadcrumbTitle = document.getElementById('breadcrumbTitle');
    const sidebarToggle = document.getElementById('sidebarToggle');

    /* ===== Header: Home link ===== */

    document.getElementById('homeLink').addEventListener('click', (e) => {
      e.preventDefault();
      closeSidebar();
      history.pushState(null, '', window.location.pathname);
      state.current = null;
      state.filter = 'all';
      showDashboard();
    });

    /* ===== Mobile Sidebar Toggle ===== */

    sidebarToggle.addEventListener('click', () => {
      const isOpen = sidebar.classList.toggle('sidebar--open');
      overlay.classList.toggle('sidebar-overlay--visible', isOpen);
      sidebarToggle.setAttribute('aria-expanded', String(isOpen));
    });

    overlay.addEventListener('click', closeSidebar);

    function closeSidebar() {
      sidebar.classList.remove('sidebar--open');
      overlay.classList.remove('sidebar-overlay--visible');
      sidebarToggle.setAttribute('aria-expanded', 'false');
    }

    /* ===== Breadcrumb ===== */

    function showBreadcrumb(doc) {
      const cat = doc.category || 'etc';
      breadcrumbCategory.textContent = CATEGORY_LABELS[cat] || cat;
      breadcrumbTitle.textContent = doc.title;
      breadcrumb.style.display = 'flex';
    }

    function hideBreadcrumb() {
      breadcrumb.style.display = 'none';
    }

    /* ===== TOC ===== */

    function buildToc(contentEl) {
      const headings = contentEl.querySelectorAll('h2, h3');
      tocList.innerHTML = '';

      if (headings.length === 0) {
        hideToc();
        return;
      }

      headings.forEach((h, i) => {
        const id = 'heading-' + i;
        h.id = id;
        const li = document.createElement('li');
        const depth = h.tagName === 'H3' ? 3 : 2;
        li.className = `toc-panel__item toc-panel__item--depth-${depth}`;
        const a = document.createElement('a');
        a.href = 'javascript:void(0)';
        a.textContent = h.textContent;
        a.dataset.headingId = id;
        li.appendChild(a);
        tocList.appendChild(li);
      });

      showToc();
      initTocObserver(contentEl);
    }

    function showToc() {
      document.body.classList.add('has-toc');
    }

    function hideToc() {
      document.body.classList.remove('has-toc');
      tocList.innerHTML = '';
    }

    // Smooth scroll on TOC link click
    tocList.addEventListener('click', (e) => {
      const a = e.target.closest('a[data-heading-id]');
      if (!a) return;
      e.preventDefault();
      const target = document.getElementById(a.dataset.headingId);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });

    // Intersection Observer for TOC active state
    let tocObserver = null;

    function initTocObserver(contentEl) {
      if (tocObserver) tocObserver.disconnect();

      const headings = contentEl.querySelectorAll('h2, h3, h4');
      const rootMargin = `-${getComputedStyle(document.documentElement).getPropertyValue('--header-height').trim()} 0px -60% 0px`;

      tocObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const link = tocList.querySelector(`[data-heading-id="${entry.target.id}"]`);
          if (!link) return;
          const item = link.parentElement;
          if (entry.isIntersecting) {
            tocList.querySelectorAll('.toc-panel__item--active').forEach(el => el.classList.remove('toc-panel__item--active'));
            item.classList.add('toc-panel__item--active');
          }
        });
      }, { rootMargin });

      headings.forEach(h => tocObserver.observe(h));
    }

    /* ===== Frontmatter Parser ===== */

    function parseFrontmatter(text) {
      const match = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
      if (!match) return { meta: {}, body: text };
      const meta = {};
      for (const line of match[1].split('\n')) {
        const idx = line.indexOf(':');
        if (idx === -1) continue;
        const key = line.slice(0, idx).trim();
        let val = line.slice(idx + 1).trim();
        if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
        if (val.startsWith('[')) {
          const closingIdx = val.lastIndexOf(']');
          const inner = closingIdx !== -1 ? val.slice(1, closingIdx) : val.slice(1);
          val = inner.split(',').map(s => s.trim().replace(/^["']|["']$/g, ''));
        }
        meta[key] = val;
      }
      return { meta, body: match[2] };
    }

    /* ===== Sidebar: Document List ===== */

    function buildDocList(docs) {
      const groups = {};
      for (const doc of docs) {
        const cat = doc.category || 'etc';
        (groups[cat] ||= []).push(doc);
      }
      const container = document.getElementById('docList');
      container.innerHTML = '';
      for (const [cat, items] of Object.entries(groups)) {
        const group = document.createElement('div');
        group.className = 'sidebar__group';
        group.innerHTML = `<div class="sidebar__group-header">${CATEGORY_LABELS[cat] || cat}</div>`;
        const list = document.createElement('ul');
        list.className = 'sidebar__list';
        for (const doc of items) {
          const li = document.createElement('li');
          li.className = 'sidebar__item';
          li.dataset.id = doc.id;
          li.innerHTML = `<a href="#${doc.id}">${doc.title}</a>`;
          list.appendChild(li);
        }
        group.appendChild(list);
        container.appendChild(group);
      }
    }

    /* ===== Meta Card (Document header) ===== */

    function renderMetaCard(meta, thumbnail) {
      if (!meta.title) return '';
      const rows = [];
      if (meta.date) {
        rows.push(`<div class="meta-card__row">
          <span class="meta-card__label">날짜</span>
          <span class="badge badge--default">${meta.date}</span>
        </div>`);
      }
      if (meta.genre) {
        const tags = Array.isArray(meta.genre) ? meta.genre : [meta.genre];
        rows.push(`<div class="meta-card__row">
          <span class="meta-card__label">장르</span>
          ${tags.map(g => `<span class="badge badge--genre">${g}</span>`).join('')}
        </div>`);
      }
      if (meta.platform) {
        const tags = Array.isArray(meta.platform) ? meta.platform : [meta.platform];
        rows.push(`<div class="meta-card__row">
          <span class="meta-card__label">플랫폼</span>
          ${tags.map(p => `<span class="badge badge--platform">${p}</span>`).join('')}
        </div>`);
      }
      const thumbHtml = thumbnail
        ? `<div class="meta-card__thumb">
            <img src="${thumbnail}" alt="${meta.title}" loading="lazy"
              onerror="this.parentElement.style.display='none'">
           </div>`
        : '';
      return `<div class="meta-card ${thumbnail ? 'meta-card--has-thumb' : ''}">
        ${thumbHtml}
        <div class="meta-card__info">
          <div class="meta-card__title">${meta.title}</div>
          ${rows.join('\n')}
        </div>
      </div>`;
    }

    /* ===== Filter Tabs (with counts) ===== */

    function renderFilterTabs(docs, activeFilter) {
      const counts = {};
      for (const doc of docs) {
        const cat = doc.category || 'etc';
        counts[cat] = (counts[cat] || 0) + 1;
      }
      const allTab = `<button class="filter-tab ${activeFilter === 'all' ? 'filter-tab--active' : ''}"
        data-filter="all" aria-pressed="${activeFilter === 'all'}">전체 <span class="filter-tab__count">${docs.length}</span></button>`;
      const catTabs = Object.entries(counts).map(([cat, n]) =>
        `<button class="filter-tab ${activeFilter === cat ? 'filter-tab--active' : ''}"
          data-filter="${cat}" aria-pressed="${activeFilter === cat}">${CATEGORY_LABELS[cat] || cat} <span class="filter-tab__count">${n}</span></button>`
      ).join('');
      return `<div class="dashboard-filters" role="group" aria-label="카테고리 필터">${allTab}${catTabs}</div>`;
    }

    /* ===== Document Card ===== */

    function renderDocCard(doc) {
      const cat = doc.category || 'etc';
      const catLabel = CATEGORY_LABELS[cat] || cat;
      const catClass = CATEGORY_CSS[cat] || 'doc-card__category--etc';
      const dateStr = doc.date ? `<div class="doc-card__date">${doc.date}</div>` : '';
      const genres = Array.isArray(doc.genre) ? doc.genre : (doc.genre ? [doc.genre] : []);
      const platforms = Array.isArray(doc.platform) ? doc.platform : (doc.platform ? [doc.platform] : []);
      const genreBadges = genres.map(g => `<span class="badge badge--genre">${g}</span>`).join('');
      const platformBadges = platforms.map(p => `<span class="badge badge--platform">${p}</span>`).join('');
      const hasPath = !!doc.path;
      const disabledAttr = hasPath ? '' : ' aria-disabled="true" tabindex="-1" style="opacity:0.45;cursor:default;pointer-events:none;"';

      // Thumbnail
      const gradient = doc.thumbnailGradient || 'linear-gradient(135deg, #1e1e36 0%, #2a2a4a 100%)';
      let thumbnailHtml;
      if (doc.thumbnail) {
        thumbnailHtml = `
          <div class="doc-card__thumbnail">
            <img
              class="doc-card__thumbnail-img"
              src="${doc.thumbnail}"
              alt="${doc.title} 대표 이미지"
              loading="lazy"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
            >
            <div class="doc-card__thumbnail-fallback" style="display:none;background:${gradient};" aria-hidden="true"></div>
            <span class="doc-card__category ${catClass}" aria-label="${catLabel}">${catLabel}</span>
          </div>`;
      } else {
        thumbnailHtml = `
          <div class="doc-card__thumbnail">
            <div class="doc-card__thumbnail-fallback" style="background:${gradient};" aria-hidden="true"></div>
            <span class="doc-card__category ${catClass}" aria-label="${catLabel}">${catLabel}</span>
          </div>`;
      }

      return `
        <a class="doc-card" href="${hasPath ? '#' + doc.id : 'javascript:void(0)'}"
           role="article" aria-label="${doc.title} (${catLabel})"${disabledAttr}>
          ${thumbnailHtml}
          <div class="doc-card__body">
            <div class="doc-card__title">${doc.title}</div>
            ${dateStr}
            <div class="doc-card__badges">
              ${genreBadges}${platformBadges}
            </div>
          </div>
        </a>`;
    }

    /* ===== Render Dashboard ===== */

    function showDashboard() {
      // Sidebar active 해제
      document.querySelectorAll('.sidebar__item').forEach(el => {
        el.classList.remove('sidebar__item--active');
      });

      // TOC / Breadcrumb 숨김
      hideToc();
      hideBreadcrumb();

      // Dashboard layout
      mainContent.classList.add('main__inner--dashboard');

      const filtered = state.filter === 'all'
        ? state.docs
        : state.docs.filter(d => (d.category || 'etc') === state.filter);

      const cardsHtml = filtered.length > 0
        ? filtered.map(renderDocCard).join('')
        : `<div class="doc-grid__empty">해당 카테고리의 문서가 없습니다.</div>`;

      mainContent.innerHTML = `
        <div class="dashboard-heading">
          <div class="dashboard-heading__title">리서치 문서</div>
          <div class="dashboard-heading__sub">분석 문서를 선택해 내용을 확인하세요.</div>
        </div>
        ${renderFilterTabs(state.docs, state.filter)}
        <div class="doc-grid" role="list" aria-label="문서 목록">
          ${cardsHtml}
        </div>`;

      // 필터 탭 이벤트
      mainContent.querySelectorAll('.filter-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          state.filter = btn.dataset.filter;
          showDashboard();
        });
        btn.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            btn.click();
          }
        });
      });

      window.scrollTo(0, 0);
    }

    /* ===== Load & Render Document ===== */

    async function loadDoc(id) {
      const doc = state.docs.find(d => d.id === id);
      if (!doc || !doc.path) return;
      state.current = id;

      // Sidebar active
      document.querySelectorAll('.sidebar__item').forEach(el => {
        el.classList.toggle('sidebar__item--active', el.dataset.id === id);
      });

      // Mobile sidebar 닫기
      closeSidebar();

      // 로딩 상태 표시
      mainContent.classList.remove('main__inner--dashboard');
      mainContent.innerHTML = `
        <div class="loading-state" aria-live="polite">
          <div class="loading-spinner" role="status" aria-hidden="true"></div>
          <p class="loading-state__text">문서를 불러오는 중...</p>
        </div>`;

      // Breadcrumb 표시
      showBreadcrumb(doc);

      // Fetch & parse
      const res = await fetch(doc.path);
      const text = await res.text();
      const { meta, body } = parseFrontmatter(text);

      const html = marked.parse(body);
      mainContent.innerHTML = renderMetaCard(meta, doc.thumbnail) + `<div class="content">${html}</div>`;

      buildToc(mainContent.querySelector('.content'));
      window.scrollTo(0, 0);
    }

    /* ===== Hash Routing ===== */

    function onHashChange() {
      const hash = location.hash.slice(1);
      if (hash && state.docs.length > 0) {
        const doc = state.docs.find(d => d.id === hash);
        if (doc && doc.path) {
          loadDoc(hash);
        } else {
          state.current = null;
          showDashboard();
        }
      } else if (!hash && state.docs.length > 0) {
        state.current = null;
        showDashboard();
      }
    }

    window.addEventListener('hashchange', onHashChange);

    /* ===== Init ===== */

    (async () => {
      try {
        const res = await fetch('./docs.json');
        const data = await res.json();
        const docs = data.documents || data;
        state.docs = docs.map(d => ({
          ...d,
          id: d.id || (d.path
            ? d.path.replace(/^.*\/research\//, '').replace(/\.md$/, '')
            : d.title.toLowerCase().replace(/\s+/g, '-'))
        }));
        buildDocList(state.docs);
        if (location.hash.length > 1) {
          onHashChange();
        } else {
          showDashboard();
        }
      } catch (err) {
        mainContent.innerHTML = `
          <div class="loading-state">
            <p class="loading-state__text" style="color:var(--color-text-muted)">
              문서 목록을 불러오지 못했습니다. 페이지를 새로고침 해주세요.
            </p>
          </div>`;
        console.error('docs.json 로드 실패:', err);
      }
    })();
  </script>

</body>
</html>
